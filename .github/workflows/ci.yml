# Crivacy CI — lint, typecheck, test, build, OpenAPI drift gate.
#
# Runs on every push and PR to master.
# No deployment — this repo is public, deploy is via scp/rsync only.
#
# Supply-chain hardening:
#   - Third-party actions are pinned to commit SHAs (not floating tags)
#     so a retagged `v4` on a compromised upstream cannot hijack CI.
#     Dependabot (see `.github/dependabot.yml`) opens PRs to bump the
#     SHA as new releases cut, keeping the pins current with review.
#   - `permissions: contents: read` at the workflow level revokes the
#     default write scope on `GITHUB_TOKEN`. Jobs that ever need to
#     write (none today) must escalate in-line.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimum privilege for every job in the workflow. Individual jobs may
# override with a wider `permissions:` block if a new capability is
# genuinely required — absent an override, even a compromised action
# cannot push code, open PRs, or read org secrets from inside CI.
permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ---------------------------------------------------------------------------
  # Lint + Typecheck + OpenAPI
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: OpenAPI drift check
        run: pnpm --filter @crivacy/web openapi:check

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm --filter @crivacy/web build

  # ---------------------------------------------------------------------------
  # Dependency audit — block PRs introducing high/critical CVEs.
  # Complements Dependabot (which opens bump PRs proactively); this
  # gate catches CVEs that landed via transitive deps between Dependabot
  # runs or via a lockfile regeneration on a human branch. `--prod`
  # scopes the check to runtime deps so devDependency churn (test
  # harness, build tooling) does not block merges.
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod, high/critical blocks)
        run: pnpm audit --audit-level=high --prod

  # ---------------------------------------------------------------------------
  # Secret scan
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
