# Crivacy Monitoring Stack
# Full observability for the B2B KYC API platform.
# All ports bound to 127.0.0.1 — access via SSH tunnel or reverse proxy only.
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up -d

x-common: &common
  restart: unless-stopped
  networks:
    - crivacy-monitoring-net

services:
  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection & alerting engine
  # ---------------------------------------------------------------------------
  prometheus:
    <<: *common
    image: prom/prometheus:v2.53.0
    container_name: crivacy-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - crivacy-monitoring-net
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Grafana — dashboards & visualization
  # ---------------------------------------------------------------------------
  grafana:
    <<: *common
    image: grafana/grafana-oss:11.4.0
    container_name: crivacy-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=warn
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    volumes:
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      prometheus:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Loki — log aggregation
  # ---------------------------------------------------------------------------
  loki:
    <<: *common
    image: grafana/loki:3.3.0
    container_name: crivacy-loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ../../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------
  # Promtail — log shipper (Docker socket + container logs)
  # ---------------------------------------------------------------------------
  promtail:
    <<: *common
    image: grafana/promtail:3.3.0
    container_name: crivacy-promtail
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ../../promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      loki:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Tempo — distributed tracing (OTLP receiver)
  # ---------------------------------------------------------------------------
  tempo:
    <<: *common
    image: grafana/tempo:2.6.0
    container_name: crivacy-tempo
    command:
      - "-config.file=/etc/tempo/tempo-config.yml"
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    volumes:
      - ../../tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing (Telegram + email)
  # ---------------------------------------------------------------------------
  alertmanager:
    <<: *common
    image: prom/alertmanager:v0.27.0
    container_name: crivacy-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ../../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # Node Exporter — host-level metrics
  # ---------------------------------------------------------------------------
  node-exporter:
    <<: *common
    image: prom/node-exporter:v1.8.2
    container_name: crivacy-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
    pid: host
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # Postgres Exporter — PostgreSQL metrics
  # ---------------------------------------------------------------------------
  postgres-exporter:
    <<: *common
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: crivacy-postgres-exporter
    ports:
      - "127.0.0.1:9187:9187"
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN}
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # Blackbox Exporter — synthetic HTTP probes
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    <<: *common
    image: prom/blackbox-exporter:v0.25.0
    container_name: crivacy-blackbox-exporter
    command:
      - "--config.file=/etc/blackbox-exporter/blackbox.yml"
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - ../../blackbox-exporter/blackbox.yml:/etc/blackbox-exporter/blackbox.yml:ro
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # cAdvisor — container metrics
  # ---------------------------------------------------------------------------
  cadvisor:
    <<: *common
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: crivacy-cadvisor
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      resources:
        limits:
          memory: 128m

  # ---------------------------------------------------------------------------
  # Telegram Alert Bot — Alertmanager webhook → Telegram + status page
  # ---------------------------------------------------------------------------
  telegram-alert-bot:
    <<: *common
    build:
      context: ../../scripts/telegram-alert-bot
      dockerfile: Dockerfile
    container_name: crivacy-telegram-alert-bot
    ports:
      - "127.0.0.1:9095:9095"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ONCALL_CHAT_ID=${ONCALL_CHAT_ID:-}
      - BOT_PORT=9095
      - STATUS_API_URL=${CRIVACY_API_BASE_URL:-}
      - STATUS_API_TOKEN=${STATUS_API_TOKEN:-}
    deploy:
      resources:
        limits:
          memory: 64m

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  crivacy-monitoring-net:
    name: crivacy-monitoring-net
    driver: bridge
    external: false
  default:
    name: bridge
    external: true
