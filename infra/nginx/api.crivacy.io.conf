# api.crivacy.io — reverse proxy to Next.js API (port 3001).
#
# Cloudflare terminates TLS. This server block:
#   1. Verifies the request came through Cloudflare (via CF-Connecting-IP header)
#   2. Proxies to the Next.js backend on 127.0.0.1:3001
#   3. Sets security headers
#   4. Rate limits at the nginx layer (defense-in-depth, app also rate limits)
#
# Certificate: Cloudflare Origin Certificate (15-year, stored in /etc/nginx/ssl/)
#
# Paths served:
#   /api/v1/*            — firm-authenticated API endpoints
#   /api/webhooks/*      — inbound webhooks (Didit)
#   /api/v1/health       — liveness probe
#   /api/v1/metrics      — Prometheus scraping (loopback only via separate block)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.crivacy.io;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/nginx/ssl/crivacy.io-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/crivacy.io-origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Cloudflare-only access (include the Cloudflare IP allowlist)
    include /etc/nginx/snippets/cloudflare-ips.conf;
    deny all;

    # Security headers
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Request size limit
    client_max_body_size 1m;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Buffer settings
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          8 16k;
    }

    # Block direct access to metrics (Prometheus scrapes via loopback)
    location = /api/v1/metrics {
        deny all;
    }

    # Health endpoint — no rate limit, fast response
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/api.crivacy.io.access.log combined;
    error_log  /var/log/nginx/api.crivacy.io.error.log warn;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.crivacy.io;
    return 301 https://$host$request_uri;
}
