# Main nginx configuration for Crivacy backend host (<BACKEND_API_HOST>).
#
# This is the top-level nginx.conf. It includes:
#   - Global settings (worker processes, connections, logging)
#   - HTTP block with shared settings
#   - Per-domain server blocks from conf.d/
#
# Deployment:
#   scp infra/nginx/nginx.conf root@<BACKEND_API_HOST>:/etc/nginx/nginx.conf
#   scp infra/nginx/*.conf root@<BACKEND_API_HOST>:/etc/nginx/conf.d/
#   scp -r infra/nginx/snippets/ root@<BACKEND_API_HOST>:/etc/nginx/snippets/
#   ssh root@<BACKEND_API_HOST> "nginx -t && systemctl reload nginx"

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # -----------------------------------------------------------------------
    # Basic
    # -----------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format combined_realip '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" '
                               'rt=$request_time uct=$upstream_connect_time '
                               'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log combined_realip;

    # -----------------------------------------------------------------------
    # Gzip
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # -----------------------------------------------------------------------
    # Security
    # -----------------------------------------------------------------------
    # Use real client IP from Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # -----------------------------------------------------------------------
    # SSL shared settings
    # -----------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # -----------------------------------------------------------------------
    # Rate limiting (nginx layer — defense in depth)
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_login:1m rate=5r/m;

    # -----------------------------------------------------------------------
    # Include per-domain server blocks
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/snippets/metrics-loopback.conf;
}
