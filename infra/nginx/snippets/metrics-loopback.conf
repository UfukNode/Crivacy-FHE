# Metrics endpoint — loopback only.
#
# Used by Prometheus to scrape /api/v1/metrics.
# This server block listens on port 3002 (loopback) and proxies to the
# Next.js backend, allowing the metrics path.
#
# Include in the main nginx.conf or as a separate server block.

server {
    listen 127.0.0.1:3002;
    server_name _;

    location = /api/v1/metrics {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location / {
        return 404;
    }
}
