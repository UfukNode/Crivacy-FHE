# docs.crivacy.io — public API documentation site.
#
# Same Next.js backend (port 3001). Public paths:
#   /docs, /docs/*

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.crivacy.io;

    ssl_certificate     /etc/nginx/ssl/crivacy.io-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/crivacy.io-origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    include /etc/nginx/snippets/cloudflare-ips.conf;
    deny all;

    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Docs are cacheable
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout  5s;
        proxy_send_timeout     15s;
        proxy_read_timeout     15s;
    }

    # Block API and internal paths
    location /api/ {
        deny all;
    }
    location /dashboard/ {
        deny all;
    }
    location /admin/ {
        deny all;
    }
    location /login {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/docs.crivacy.io.access.log combined;
    error_log  /var/log/nginx/docs.crivacy.io.error.log warn;
}

server {
    listen 80;
    listen [::]:80;
    server_name docs.crivacy.io;
    return 301 https://$host$request_uri;
}
