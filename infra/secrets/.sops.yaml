# sops configuration for Crivacy secret management.
#
# Uses age encryption (no cloud KMS dependency).
# Keys are stored in:
#   - Operator key: ~/.config/sops/age/keys.txt (on each operator machine)
#   - CI key: stored as a GitHub secret (for future CI/CD)
#
# Encryption:
#   sops --encrypt --in-place infra/secrets/production.env
#
# Decryption:
#   sops --decrypt infra/secrets/production.env > /opt/crivacy/api/.env
#
# Key generation:
#   age-keygen -o ~/.config/sops/age/keys.txt
#   # Public key will be printed — add it below

creation_rules:
  # Production secrets for the backend API host (<BACKEND_API_HOST>)
  - path_regex: production\.env$
    age: >-
      age1REPLACE_WITH_OPERATOR_PUBLIC_KEY

  # Monitoring stack secrets
  - path_regex: monitoring\.env$
    age: >-
      age1REPLACE_WITH_OPERATOR_PUBLIC_KEY

  # Validator sidecar secrets
  - path_regex: validator\.env$
    age: >-
      age1REPLACE_WITH_OPERATOR_PUBLIC_KEY
