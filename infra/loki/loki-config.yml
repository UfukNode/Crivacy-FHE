# Crivacy Loki 3.x — Single-node log aggregation
# Mounted at /etc/loki/loki-config.yml inside the container.
# Data volume: /loki (Docker named volume loki_data)

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    chunks_directory: /loki/chunks
    rules_directory: /loki/rules
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

ingester:
  wal:
    dir: /loki/wal
  lifecycler:
    ring:
      replication_factor: 1

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h          # 7 days
  ingestion_rate_mb: 8                       # MB/s per tenant
  ingestion_burst_size_mb: 16                # burst allowance
  max_entries_limit_per_query: 5000
  max_query_series: 500
  max_streams_per_user: 0                    # unlimited for single tenant
  max_global_streams_per_user: 0
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 15MB
  split_queries_by_interval: 15m
  max_cache_freshness_per_query: 10m

query_range:
  align_queries_with_step: true
  parallelise_shardable_queries: true
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_cancel_period: 24h
  delete_request_store: filesystem

chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 150

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h                     # 30 days

analytics:
  reporting_enabled: false
